# Codecov configuration.
#
# The coverage report is produced by `.github/workflows/test.yml`: gcovr emits a
# Cobertura report over the plug-in sources under src/, and codecov/codecov-action
# uploads it here.

coverage:
  status:
    # Keep coverage informational so a drop never blocks a PR merge on its own.
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, files"
  require_changes: true

# Report only on the plug-in sources the workflow measures (gcovr --filter 'src/.*').
flags:
  unittests:
    paths:
      - src/
